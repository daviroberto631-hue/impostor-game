<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INFILTRADO - Davi Roberto</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap');

        :root {
            --bg-dark: #07090e;
            --card-dark: #0f131a;
            --accent-blue: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.3);
            --text-main: #f0f4f8;
            --text-dim: #6c7a89;
            --red-impostor: #ff3344;
            --red-glow: rgba(255, 51, 68, 0.3);
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: #020406; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; width: 100vw; overflow: hidden; color: var(--text-main);
        }

        #app { 
            background: radial-gradient(circle at top, #0d1527 0%, #05070a 100%);
            width: 100%; max-width: 420px; height: 100vh;
            position: relative; display: flex; flex-direction: column;
            padding: 30px 20px; overflow: hidden;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .page { 
            display: none; flex-direction: column; height: 100%; 
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .active { display: flex; }

        /* HEADER ESPIONAGEM PREMIUM */
        .home-header { text-align: center; margin-bottom: auto; margin-top: auto; }
        
        .logo-spy-container {
            position: relative; width: 100px; height: 100px; margin: 0 auto 15px;
            background: rgba(0, 0, 0, 0.4); border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }
        .logo-spy-container::after {
            content: ''; position: absolute; width: 110%; height: 110%;
            border-radius: 50%; border: 1px dashed rgba(0, 210, 255, 0.3);
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate { to { transform: rotate(360deg); } }

        .main-title { 
            font-family: 'Orbitron', sans-serif; font-size: 34px; font-weight: 900; 
            letter-spacing: 6px; text-transform: uppercase; margin-bottom: 5px;
            color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .tagline { font-size: 11px; letter-spacing: 4px; color: var(--accent-blue); text-transform: uppercase; font-weight: 600; opacity: 0.8; }

        /* BOTÕES ESTILO MENU CLÁSSICO */
        .menu-btn {
            background: linear-gradient(135deg, rgba(15,20,30,0.8) 0%, rgba(10,13,20,0.9) 100%);
            border: 1px solid var(--border-color);
            border-radius: 12px; padding: 16px 20px; margin-bottom: 12px;
            display: flex; align-items: center; cursor: pointer;
            transition: all 0.2s ease; position: relative;
        }
        .menu-btn::before {
            content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 3px;
            background: transparent; transition: all 0.2s;
        }
        .menu-btn:active { transform: scale(0.98); background: rgba(20,28,42,0.9); }
        .menu-btn.selected, .menu-btn:hover { border-color: var(--accent-blue); box-shadow: 0 0 15px var(--accent-glow); }
        .menu-btn.selected::before { background: var(--accent-blue); }
        
        .menu-btn .icon-area { width: 35px; color: var(--text-dim); display: flex; align-items: center; }
        .menu-btn.selected .icon-area { color: var(--accent-blue); }
        .menu-btn .text-area { flex-grow: 1; text-align: left; }
        .menu-btn h3 { font-size: 17px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
        .menu-btn p { font-size: 12px; color: var(--text-dim); font-weight: 500; }
        .menu-btn .arrow-right { color: var(--text-dim); display: flex; align-items: center; }

        .setup-card {
            background: var(--card-dark); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 20px; flex-grow: 1;
            display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-top { 
            display: flex; align-items: center; margin-bottom: 20px; color: var(--text-dim); 
            font-size: 13px; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: color 0.2s;
        }
        .nav-top:active { color: var(--accent-blue); }
        .nav-top i { margin-right: 6px; width: 16px; height: 16px; }

        .reveal-zone {
            position: relative; flex-grow: 1; background: #040609; border-radius: 16px;
            margin: 15px 0; overflow: hidden; display: flex; align-items: center; justify-content: center;
            border: 1px dashed rgba(255,255,255,0.1);
        }
        .sliding-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #151d2a, #0f1520); z-index: 2; display: flex; flex-direction: column;
            align-items: center; justify-content: center; touch-action: none;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .sliding-cover i { color: var(--accent-blue); filter: drop-shadow(0 0 5px var(--accent-blue)); margin-bottom: 8px; }

        .chip-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .chip { 
            background: rgba(255,255,255,0.02); padding: 14px; border-radius: 10px; 
            text-align: center; border: 1px solid var(--border-color); cursor: pointer;
            font-size: 18px; font-weight: 700; transition: all 0.2s;
        }
        .chip.selected { border-color: var(--accent-blue); background: var(--accent-glow); color: var(--accent-blue); text-shadow: 0 0 5px var(--accent-blue); }
