<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMPOSTOR RETRO-OS</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --retro-blue: #0078D7;
            --retro-gray: #A0A0A0;
            --retro-white: #F0F0F0;
            --retro-red: #E81123;
            --border: 2px solid #000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: #333; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'VT323', monospace; 
            image-rendering: pixelated;
        }

        #app { 
            background-color: var(--retro-gray); 
            width: 100%; 
            max-width: 400px; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            border: var(--border);
            box-shadow: 4px 4px 0px #000;
            position: relative;
        }

        /* Janela Estilo Retro OS */
        .window-header {
            background-color: var(--retro-blue);
            padding: 8px;
            color: white;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            display: flex;
            justify-content: space-between;
            border-bottom: var(--border);
        }

        .window-controls { display: flex; gap: 4px; }
        .win-btn { width: 12px; height: 12px; background: var(--retro-gray); border: 1px solid #000; }

        .content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }

        .page { display: none; flex-direction: column; height: 100%; justify-content: center; }
        .active { display: flex; }

        h1 { font-family: 'Press Start 2P', cursive; font-size: 14px; line-height: 1.5; margin-bottom: 20px; text-align: center; color: #000; }
        p { font-size: 20px; text-align: center; margin-bottom: 20px; color: #333; }

        /* Botões Estilo UI KIT */
        .btn-retro { 
            background-color: var(--retro-gray); 
            border: var(--border); 
            box-shadow: inset -2px -2px 0px #555, inset 2px 2px 0px #fff;
            padding: 15px; 
            font-family: 'Press Start 2P', cursive; 
            font-size: 10px; 
            cursor: pointer; 
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-retro:active { box-shadow: inset 2px 2px 0px #555; transform: translate(1px, 1px); }
        .btn-blue { background-color: var(--retro-blue); color: white; }

        .grid-players { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .opt-btn { 
            background: var(--retro-white); border: var(--border); padding: 10px; 
            font-family: 'Press Start 2P', cursive; font-size: 10px; text-align: center; 
        }
        .opt-btn.selected { background: var(--retro-blue); color: white; }

        .input-group { background: white; border: var(--border); padding: 10px; margin-bottom: 5px; display: flex; align-items: center; }
        .input-group input { border: none; font-family: 'VT323'; font-size: 20px; width: 100%; outline: none; }

        .themes-grid { display: grid; grid-template-columns: 1fr; gap: 8px; overflow-y: auto; padding: 5px; }
        .theme-card { background: var(--retro-white); border: var(--border); padding: 10px; display: flex; align-items: center; gap: 15px; }
        .theme-card.selected { background: #c0c0c0; border: 2px solid var(--retro-blue); }

        .reveal-box { background: white; border: var(--border); padding: 30px 10px; text-align: center; }
        .word-text { font-family: 'Press Start 2P', cursive; font-size: 18px; color: var(--retro-blue); display: none; margin-top: 20px; }

        .vote-item { background: var(--retro-white); border: var(--border); padding: 12px; margin-bottom: 6px; font-family: 'Press Start 2P', cursive; font-size: 8px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div id="app">
    <div class="window-header">
        <span>IMPOSTOR.EXE</span>
        <div class="window-controls">
            <div class="win-btn"></div>
            <div class="win-btn"></div>
        </div>
    </div>

    <div class="content">
        <!-- P1: INÍCIO -->
        <div id="page1" class="page active">
            <h1>RETRO OS<br>SYSTEM LOADED</h1>
            <button class="btn-retro btn-blue" onclick="goToPage(2)">START GAME</button>
        </div>

        <!-- P2: JOGADORES -->
        <div id="page2" class="page">
            <h1>SELECT USERS</h1>
            <div class="grid-players" id="playerGrid"></div>
            <button class="btn-retro btn-blue" id="btnNext2" style="display:none; margin-top:20px" onclick="setupNames()">NEXT</button>
        </div>

        <!-- P3: NOMES -->
        <div id="page3" class="page">
            <h1>USER REGISTRY</h1>
            <div id="nameList" style="overflow-y:auto; max-height: 60%;"></div>
            <button class="btn-retro btn-blue" onclick="goToPage('Themes')">CONFIRM</button>
        </div>

        <!-- P4: TEMAS -->
        <div id="pageThemes" class="page">
            <h1>SELECT DATA SET</h1>
            <div class="themes-grid" id="themesGrid"></div>
            <button class="btn-retro btn-blue" onclick="prepareGame()">BOOT SECTOR</button>
        </div>

        <!-- P5: REVELAÇÃO -->
        <div id="pageReveal" class="page">
            <h1 id="currentPlayerName">USER_NAME</h1>
            <div class="reveal-box">
                <p id="instructionText">Aguardando acesso...</p>
                <div id="wordDisplay" class="word-text">---</div>
            </div>
            <button class="btn-retro" id="revealBtn" onclick="toggleReveal()">VIEW DATA</button>
        </div>

        <!-- P6: VOTAÇÃO -->
        <div id="pageVote" class="page">
            <h1>TERMINATE USER?</h1>
            <div id="voteList" style="overflow-y:auto;"></div>
        </div>

        <!-- P7: RESULTADO -->
        <div id="pageResult" class="page">
            <h1 id="resultVerdict">STATUS</h1>
            <div class="reveal-box" style="text-align: left; font-size: 16px;">
                <div style="margin-bottom:10px">ID: <span id="resImpName"></span></div>
                <div style="margin-bottom:10px; color: var(--retro-red)">DATA: <span id="resImpWord"></span></div>
                <div style="color: var(--retro-blue)">CIVIL: <span id="resCivWord"></span></div>
            </div>
            <button class="btn-retro btn-blue" onclick="goToPage('Themes')">RETRY</button>
        </div>
    </div>
</div>

<script>
    // AS MESMAS PALAVRAS E LÓGICA DO CÓDIGO ANTERIOR
    const THEMES = [
        { id: 'comida', name: 'COMIDA.DAT', icon: 'utensils', pairs: [['pizza', 'esfiha'],['hambúrguer', 'sanduíche'],['macarrão', 'lasanha'],['arroz', 'cuscuz'],['feijão', 'lentilha'],['sorvete', 'iogurte congelado'],['bolo', 'pudim'],['batata frita', 'batata assada'],['sushi', 'temaki'],['chocolate', 'brigadeiro'],['salada', 'cesar salad'],['omelete', 'mexido de ovos'],['panqueca', 'crepe'],['tapioca', 'beiju'],['cachorro-quente', 'misto quente'],['nuggets', 'frango empanado'],['milho verde', 'ervilha'],['cenoura cozida', 'batata doce'],['espaguete', 'talharim'],['risoto', 'paella'],['camarão', 'lagosta'],['peixe grelhado', 'filé de tilápia'],['frango assado', 'chester'],['carne de panela', 'ensopado'],['churrasco', 'barbecue'],['torrada', 'pão de forma'],['iogurte', 'vitamina de fruta'],['mingau', 'creme de arroz'],['pudim de leite', 'flan'],['cookie', 'brownie'],['torta de limão', 'mousse de limão'],['pastel', 'coxinha'],['empada', 'empadão'],['sopa de legumes', 'caldo verde'],['feijoada', 'dobradinha']] },
        { id: 'profissao', name: 'WORK.SYS', icon: 'briefcase', pairs: [['médico', 'enfermeiro'],['professor', 'tutor'],['policial', 'segurança'],['bombeiro', 'salva-vidas'],['advogado', 'juiz'],['engenheiro', 'arquiteto'],['piloto', 'comissário de bordo'],['chef de cozinha', 'garçom'],['programador', 'designer'],['jogador de futebol', 'técnico'],['dentista', 'ortodontista'],['veterinário', 'biólogo'],['psicólogo', 'terapeuta'],['contador', 'auditor'],['administrador', 'gestor'],['jornalista', 'repórter'],['fotógrafo', 'cinegrafista'],['ator', 'dublador'],['músico', 'DJ'],['pintor', 'ilustrador'],['eletricista', 'encanador'],['pedreiro', 'carpinteiro'],['motorista de ônibus', 'motorista de caminhão'],['entregador', 'carteiro'],['vendedor', 'representante comercial'],['atendente', 'recepcionista'],['gerente de loja', 'supervisor'],['advogado criminalista', 'delegado'],['cientista', 'pesquisador'],['astronauta', 'piloto de teste'],['modelo', 'influenciador'],['publicitário', 'marketing'],['economista', 'analista financeiro'],['diplomata', 'relações internacionais'],['bibliotecário', 'arquivista']] },
        { id: 'animais', name: 'FAUNA.EXE', icon: 'dog', pairs: [['Cachorro', 'Lobo'], ['Gato', 'Pantera'], ['Leão', 'Tigre'], ['Zebra', 'Cavalo'], ['Jacaré', 'Crocodilo'], ['Golfinho', 'Tubarão'], ['Baleia', 'Golfinho'], ['Cobra', 'Minhoca'], ['Urso', 'Panda'], ['Macaco', 'Chimpanzé'], ['Camelo', 'Lhama'], ['Rinoceronte', 'Hipopótamo'], ['Águia', 'Falcão'], ['Coruja', 'Morcego'], ['Galinha', 'Peru'], ['Pato', 'Ganso'], ['Sapo', 'Rã'], ['Ovelha', 'Cabra'], ['Coelho', 'Hamster'], ['Formiga', 'Cupim'], ['Abelha', 'Vespa'], ['Escorpião', 'Aranha'], ['Polvo', 'Lula'], ['Cavalo-marinho', 'Peixe'], ['Pinguim', 'Foca'], ['Pavão', 'Avestruz'], ['Papagaio', 'Arara'], ['Tartaruga', 'Jabuti'], ['Porco', 'Javali'], ['Cervo', 'Alce']] },
        { id: 'desenhos', name: 'TOONS.ARC', icon: 'tv', pairs: [['Mickey', 'Minnie'], ['Pato Donald', 'Pateta'], ['Toy Story', 'Carros'], ['Shrek', 'Madagascar'], ['Kung Fu Panda', 'Panda do Kung Fu'], ['Ben 10', 'Generator Rex'], ['Hora de Aventura', 'Apenas um Show'], ['Bob Esponja', 'Patrick'], ['Scooby-Doo', 'Coragem'], ['Os Simpsons', 'Futurama'], ['South Park', 'Family Guy'], ['Dragon Ball', 'Naruto'], ['Naruto', 'Boruto'], ['Pokémon', 'Digimon'], ['Yu-Gi-Oh', 'Beyblade'], ['Avatar', 'Korra'], ['Teen Titans', 'Jovens Titãs'], ['Liga da Justiça', 'Vingadores'], ['Homem-Aranha', 'Batman'], ['Frozen', 'Encantada'], ['Moana', 'Raya'], ['Lilo & Stitch', 'Big Hero'], ['Divertidamente', 'Soul'], ['Wall-E', 'Robôs'], ['Monstros S.A. - Univ.', 'Monstros S.A.'], ['Procurando Nemo', 'Procurando Dory'], ['Os Incríveis', 'Megamente'], ['A Era do Gelo', 'Rio'], ['Tom & Jerry', 'Piu Piu e Frajola'], ['Looney Tunes', 'Animaniacs']] },
        { id: 'objetos', name: 'GEAR.CFG', icon: 'package', pairs: [['Cadeira', 'Banco'], ['Sofá', 'Poltrona'], ['Mesa', 'Escrivaninha'], ['Geladeira', 'Freezer'], ['Fogão', 'Microondas'], ['Televisão', 'Monitor'], ['Controle', 'Joystick'], ['Mouse', 'Teclado'], ['Notebook', 'Tablet'], ['Celular', 'Iphone'], ['Ventilador', 'Ar-condicionado'], ['Espelho', 'Vidro'], ['Janela', 'Porta'], ['Lâmpada', 'Lanterna'], ['Relógio', 'Cronômetro'], ['Caneta', 'Lápis'], ['Caderno', 'Livro'], ['Mochila', 'Mala'], ['Óculos', 'Lente'], ['Fone', 'Headset'], ['Carregador', 'Cabo'], ['Martelo', 'Marreta'], ['Parafuso', 'Prego'], ['Tesoura', 'Estilete'], ['Escova', 'Pente'], ['Travesseiro', 'Almofada'], ['Chuveiro', 'Torneira'], ['Garrafa', 'Copo'], ['Panela', 'Frigideira'], ['Vassoura', 'Rodo']] }
    ];

    let playerCount = 0, playerList = [], currentIdx = 0, isShowing = false, selectedTheme = null, impostorInfo = {};

    // Iniciar Grade de Jogadores
    const pGrid = document.getElementById('playerGrid');
    for(let i=3; i<=10; i++) {
        const b = document.createElement('div'); b.className='opt-btn'; b.innerText=i;
        b.onclick = () => { 
            playerCount=i; 
            document.querySelectorAll('.opt-btn').forEach(x=>x.classList.remove('selected')); 
            b.classList.add('selected'); 
            document.getElementById('btnNext2').style.display='block'; 
        };
        pGrid.appendChild(b);
    }

    // Iniciar Grade de Temas
    const tGrid = document.getElementById('themesGrid');
    THEMES.forEach(t => {
        const card = document.createElement('div'); card.className='theme-card';
        card.innerHTML = `<i data-lucide="${t.icon}"></i><div style="font-family:'Press Start 2P'; font-size:8px">${t.name}</div>`;
        card.onclick = () => { 
            selectedTheme=t; 
            document.querySelectorAll('.theme-card').forEach(c=>c.classList.remove('selected')); 
            card.classList.add('selected'); 
        };
        tGrid.appendChild(card);
    });
    lucide.createIcons();

    function goToPage(n) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        if (n === 'Themes') document.getElementById('pageThemes').classList.add('active');
        else if (n === 'Reveal') document.getElementById('pageReveal').classList.add('active');
        else if (n === 'Vote') document.getElementById('pageVote').classList.add('active');
        else if (n === 'Result') document.getElementById('pageResult').classList.add('active');
        else document.getElementById('page' + n).classList.add('active');
    }

    function setupNames() {
        const list = document.getElementById('nameList'); list.innerHTML = '';
        for(let i=1; i<=playerCount; i++) list.innerHTML += `<div class="input-group"><span>${i}:</span><input type="text" value="USER_${i}" id="pn${i}"></div>`;
        goToPage(3);
    }

    function prepareGame() {
        if(!selectedTheme) return;
        playerList = [];
        const pair = selectedTheme.pairs[Math.floor(Math.random()*selectedTheme.pairs.length)];
        const impIdx = Math.floor(Math.random()*playerCount);
        const flip = Math.random() > 0.5;
        const civWord = pair[flip?0:1];
        const impWord = pair[flip?1:0];

        for(let i=0; i<playerCount; i++) {
            const isImp = (i === impIdx);
            const pObj = { name: document.getElementById('pn'+(i+1)).value, word: isImp ? impWord : civWord, isImpostor: isImp };
            playerList.push(pObj);
            if(isImp) impostorInfo = { name: pObj.name, word: impWord, civWord: civWord };
        }
        playerList.sort(() => Math.random() - 0.5);
        currentIdx = 0;
        updateReveal();
        goToPage('Reveal');
    }

    function updateReveal() {
        document.getElementById('currentPlayerName').innerText = playerList[currentIdx].name;
        document.getElementById('wordDisplay').innerText = playerList[currentIdx].word;
        document.getElementById('wordDisplay').style.display = 'none';
        document.getElementById('instructionText').innerText = "CLIQUE PARA ACESSAR";
        isShowing = false;
    }

    function toggleReveal() {
        if(!isShowing) {
            document.getElementById('wordDisplay').style.display = 'block';
            document.getElementById('instructionText').innerText = "DADO CARREGADO:";
            isShowing = true;
        } else {
            currentIdx++;
            if(currentIdx < playerList.length) updateReveal();
            else startVoting();
        }
    }

    function startVoting() {
        const list = document.getElementById('voteList');
        list.innerHTML = '';
        playerList.forEach(p => {
            const btn = document.createElement('div');
            btn.className = 'vote-item';
            btn.innerHTML = `<span>${p.name}</span> <span style="color:var(--retro-blue)" onclick="showResult('${p.name}')">VOTE</span>`;
            btn.onclick = () => {
                 const isImp = (p.name === impostorInfo.name);
                 showResult(isImp);
            };
            list.appendChild(btn);
        });
        goToPage('Vote');
    }

    function showResult(win) {
        document.getElementById('resultVerdict').innerText = win ? "ACCESS DENIED" : "SYSTEM ERROR";
        document.getElementById('resultVerdict').style.color = win ? "#10b981" : "var(--retro-red)";
        document.getElementById('resImpName').innerText = impostorInfo.name;
        document.getElementById('resImpWord').innerText = impostorInfo.word.toUpperCase();
        document.getElementById('resCivWord').innerText = impostorInfo.civWord.toUpperCase();
        goToPage('Result');
    }
</script>
</body>
</html>
