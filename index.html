<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Impostor Premium - Super Lista</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

        :root {
            --bg-dark: #0f172a;
            --bg-card: #fdfdfb;
            --card-dark: #1e293b;
            --accent: #6366f1;
            --grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: #121212; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        #app { background-color: var(--bg-card); width: 100%; max-width: 400px; height: 100%; display: flex; flex-direction: column; padding: 30px; position: relative; }

        #app.dark-mode { background-color: var(--bg-dark); color: #fff; }

        .page { display: none; flex-direction: column; height: 100%; animation: fadeIn 0.4s ease; justify-content: center; }
        .active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .badge { font-size: 11px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; }
        .badge::before { content: ''; width: 8px; height: 8px; background: currentColor; border-radius: 50%; margin-right: 8px; }
        .title { font-size: 32px; font-weight: 900; line-height: 1.1; margin-bottom: 15px; text-align: center; }
        .subtitle { font-size: 15px; color: #666; margin-bottom: 30px; text-align: center; }

        .btn-main { background: #121212; color: white; padding: 18px; border-radius: 20px; border: none; font-weight: 700; font-size: 17px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; width: 100%; margin-top: 20px; }
        .btn-main .icon { background: white; color: black; width: 28px; height: 28px; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        
        .grid-players { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .opt-btn { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 15px; font-weight: 700; text-align: center; color: #000; }
        .opt-btn.selected { background: #000; color: #fff; }

        .name-list { overflow-y: auto; max-height: 50%; margin-bottom: 20px; }
        .input-group { background: #f1f1f1; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; color: #000; }
        .input-group input { background: transparent; border: none; font-weight: 600; width: 100%; outline: none; margin-left: 10px; }

        .themes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-height: 60%; overflow-y: auto; padding: 10px 0; }
        .theme-card { background: var(--card-dark); border-radius: 18px; padding: 15px; border: 2px solid transparent; transition: 0.3s; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .theme-card.selected { border-color: var(--accent); background: rgba(99, 102, 241, 0.2); }
        .icon-box { width: 45px; height: 45px; border-radius: 10px; background: #334155; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; color: #fff; }
        .theme-name { font-weight: 700; font-size: 14px; color: #fff; }

        .reveal-card { background: #f9f9f9; border-radius: 30px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px 20px; border: 1px solid #eee; }
        .animal-text { font-size: 35px; font-weight: 900; color: var(--accent); display: none; margin-top: 15px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="app">
    <!-- P1: INÍCIO -->
    <div id="page1" class="page active">
        <div class="badge">Impostor Premium</div>
        <h1 class="title">Pronto pra descobrir o impostor?</h1>
        <p class="subtitle">Agora com temas de Objetos, Animais e Desenhos!</p>
        <button class="btn-main" onclick="goToPage(2)">JOGAR <span class="icon">→</span></button>
    </div>

    <!-- P2: QUANTIDADE -->
    <div id="page2" class="page">
        <h1 class="title">Quantos jogadores?</h1>
        <div class="grid-players" id="playerGrid"></div>
        <button class="btn-main" id="btnNext2" style="display:none" onclick="setupNames()">CONTINUAR <span class="icon">→</span></button>
    </div>

    <!-- P3: NOMES -->
    <div id="page3" class="page">
        <h1 class="title">Quem vai jogar?</h1>
        <div class="name-list" id="nameList"></div>
        <button class="btn-main" onclick="goToPage('Themes')">ESCOLHER TEMA <span class="icon">→</span></button>
    </div>

    <!-- P4: TEMAS -->
    <div id="pageThemes" class="page">
        <h1 class="title" style="color:#fff">Escolha o Tema</h1>
        <div class="themes-grid" id="themesGrid"></div>
        <button class="btn-main" style="background:var(--grad)" onclick="prepareGame()">INICIAR RODADA <span class="icon">🔥</span></button>
    </div>

    <!-- P5: REVELAÇÃO -->
    <div id="pageReveal" class="page">
        <div class="badge" id="revealStatus" style="justify-content: center;">Vez de</div>
        <h1 class="title" id="currentPlayerName">Jogador</h1>
        <div class="reveal-card">
            <p id="instructionText">Pegue o celular e veja sua palavra.</p>
            <div id="wordDisplay" class="animal-text">---</div>
        </div>
        <button class="btn-main" id="revealBtn" onclick="toggleReveal()">VER PALAVRA <span class="icon">👁️</span></button>
    </div>

    <!-- P6: FIM -->
    <div id="pageEnd" class="page">
        <h1 class="title">Discussão!</h1>
        <p class="subtitle">Quem é o impostor?</p>
        <button class="btn-main" style="background:var(--grad)" onclick="goToPage('Themes')">JOGAR NOVAMENTE <span class="icon">↺</span></button>
        <button class="btn-main" style="background:#666" onclick="location.reload()">TROCAR JOGADORES <span class="icon">👤</span></button>
    </div>
</div>

<script>
    const THEMES = [
        { id: 'animais', name: 'Animais', icon: 'dog', pairs: [['Cachorro', 'Lobo'], ['Gato', 'Pantera'], ['Leão', 'Tigre'], ['Zebra', 'Cavalo'], ['Jacaré', 'Crocodilo'], ['Golfinho', 'Tubarão'], ['Baleia', 'Golfinho'], ['Cobra', 'Minhoca'], ['Urso', 'Panda'], ['Macaco', 'Chimpanzé'], ['Camelo', 'Lhama'], ['Rinoceronte', 'Hipopótamo'], ['Águia', 'Falcão'], ['Coruja', 'Morcego'], ['Galinha', 'Peru'], ['Pato', 'Ganso'], ['Sapo', 'Rã'], ['Ovelha', 'Cabra'], ['Coelho', 'Hamster'], ['Formiga', 'Cupim'], ['Abelha', 'Vespa'], ['Escorpião', 'Aranha'], ['Polvo', 'Lula'], ['Cavalo-marinho', 'Peixe'], ['Pinguim', 'Foca'], ['Pavão', 'Avestruz'], ['Papagaio', 'Arara'], ['Tartaruga', 'Jabuti'], ['Porco', 'Javali'], ['Cervo', 'Alce']] },
        { id: 'desenhos', name: 'Desenhos', icon: 'tv', pairs: [['Mickey', 'Minnie'], ['Pato Donald', 'Pateta'], ['Toy Story', 'Carros'], ['Shrek', 'Madagascar'], ['Kung Fu Panda', 'Panda do Kung Fu'], ['Ben 10', 'Generator Rex'], ['Hora de Aventura', 'Apenas um Show'], ['Bob Esponja', 'Patrick'], ['Scooby-Doo', 'Coragem'], ['Os Simpsons', 'Futurama'], ['South Park', 'Family Guy'], ['Dragon Ball', 'Naruto'], ['Naruto', 'Boruto'], ['Pokémon', 'Digimon'], ['Yu-Gi-Oh', 'Beyblade'], ['Avatar', 'Korra'], ['Teen Titans', 'Jovens Titãs'], ['Liga da Justiça', 'Vingadores'], ['Homem-Aranha', 'Batman'], ['Frozen', 'Encantada'], ['Moana', 'Raya'], ['Lilo & Stitch', 'Big Hero'], ['Divertidamente', 'Soul'], ['Wall-E', 'Robôs'], ['Monstros S.A.', 'Universidade Monstros'], ['Procurando Nemo', 'Procurando Dory'], ['Os Incríveis', 'Megamente'], ['A Era do Gelo', 'Rio'], ['Tom & Jerry', 'Piu Piu e Frajola'], ['Looney Tunes', 'Animaniacs']] },
        { id: 'objetos', name: 'Objetos', icon: 'package', pairs: [['Cadeira', 'Banco'], ['Sofá', 'Poltrona'], ['Mesa', 'Escrivaninha'], ['Geladeira', 'Freezer'], ['Fogão', 'Microondas'], ['Televisão', 'Monitor'], ['Controle', 'Joystick'], ['Mouse', 'Teclado'], ['Notebook', 'Tablet'], ['Celular', 'Iphone'], ['Ventilador', 'Ar-condicionado'], ['Espelho', 'Vidro'], ['Janela', 'Porta'], ['Lâmpada', 'Lanterna'], ['Relógio', 'Cronômetro'], ['Caneta', 'Lápis'], ['Caderno', 'Livro'], ['Mochila', 'Mala'], ['Óculos', 'Lente'], ['Fone', 'Headset'], ['Carregador', 'Cabo'], ['Martelo', 'Marreta'], ['Parafuso', 'Prego'], ['Tesoura', 'Estilete'], ['Escova', 'Pente'], ['Travesseiro', 'Almofada'], ['Chuveiro', 'Torneira'], ['Garrafa', 'Copo'], ['Panela', 'Frigideira'], ['Vassoura', 'Rodo']] }
    ];

    let playerCount = 0, playerList = [], currentIdx = 0, isShowing = false, selectedTheme = null;

    const pGrid = document.getElementById('playerGrid');
    for(let i=3; i<=10; i++) {
        const b = document.createElement('div'); b.className='opt-btn'; b.innerText=i;
        b.onclick = () => { playerCount=i; document.querySelectorAll('.opt-btn').forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); document.getElementById('btnNext2').style.display='flex'; };
        pGrid.appendChild(b);
    }

    const tGrid = document.getElementById('themesGrid');
    THEMES.forEach(t => {
        const card = document.createElement('div'); card.className='theme-card';
        card.innerHTML = `<div class="icon-box"><i data-lucide="${t.icon}"></i></div><div class="theme-name">${t.name}</div>`;
        card.onclick = () => { selectedTheme=t; document.querySelectorAll('.theme-card').forEach(c=>c.classList.remove('selected')); card.classList.add('selected'); };
        tGrid.appendChild(card);
    });
    lucide.createIcons();

    function goToPage(n) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('app').classList.remove('dark-mode');
        if(n === 'Themes') { document.getElementById('pageThemes').classList.add('active'); document.getElementById('app').classList.add('dark-mode'); }
        else if (n === 'Reveal') document.getElementById('pageReveal').classList.add('active');
        else if (n === 'End') document.getElementById('pageEnd').classList.add('active');
        else document.getElementById('page' + n).classList.add('active');
    }

    function setupNames() {
        const list = document.getElementById('nameList'); list.innerHTML = '';
        for(let i=1; i<=playerCount; i++) list.innerHTML += `<div class="input-group"><input type="text" value="Jogador ${i}" id="pn${i}"></div>`;
        goToPage(3);
    }

    function prepareGame() {
        if(!selectedTheme) return alert("Selecione um tema!");
        playerList = [];
        const pair = selectedTheme.pairs[Math.floor(Math.random()*selectedTheme.pairs.length)];
        const impIdx = Math.floor(Math.random()*playerCount);
        const flip = Math.random() > 0.5;

        for(let i=0; i<playerCount; i++) {
            playerList.push({ name: document.getElementById('pn'+(i+1)).value, word: (i === impIdx) ? pair[flip?1:0] : pair[flip?0:1] });
        }

        playerList.sort(() => Math.random() - 0.5);
        currentIdx = 0;
        updateReveal();
        goToPage('Reveal');
    }

    function updateReveal() {
        document.getElementById('currentPlayerName').innerText = playerList[currentIdx].name;
        document.getElementById('wordDisplay').innerText = playerList[currentIdx].word;
        document.getElementById('wordDisplay').style.display = 'none';
        document.getElementById('instructionText').style.display = 'block';
        document.getElementById('revealBtn').innerHTML = `VER PALAVRA <span class="icon">👁️</span>`;
        isShowing = false;
    }

    function toggleReveal() {
        if(!isShowing) {
            document.getElementById('wordDisplay').style.display = 'block';
            document.getElementById('instructionText').style.display = 'none';
            document.getElementById('revealBtn').innerHTML = `ESCONDER E PASSAR <span class="icon">→</span>`;
            isShowing = true;
        } else {
            currentIdx++;
            if(currentIdx < playerList.length) updateReveal();
            else goToPage('End');
        }
    }
</script>
</body>
</html>
