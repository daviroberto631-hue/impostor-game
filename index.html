
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Impostor - Davi Roberto v2.3</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg-page: #1a1a1a;
            --card-bg: #fdfdfb;
            --accent-black: #121212;
            --text-gray: #757575;
            --red-impostor: #e81123;
            --transition-speed: 0.4s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-page); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; width: 100vw; overflow: hidden; 
        }

        #app { 
            background-color: var(--card-bg); 
            width: 92%; max-width: 380px; height: 85vh; max-height: 720px;
            border-radius: 40px; position: relative;
            display: flex; flex-direction: column;
            padding: 40px 25px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            margin: auto; overflow: hidden;
        }

        /* ANIMAÇÕES DE PÁGINA */
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOutLeft { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-100%); opacity: 0; } }

        .page { 
            display: none; flex-direction: column; height: 100%; 
            animation: slideInRight var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
        }
        .active { display: flex; }

        .top-logo {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            background: white; width: 70px; height: 70px; border-radius: 22px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); z-index: 10;
        }

        .level-tag {
            font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            display: flex; align-items: center; margin-bottom: 20px; margin-top: 15px;
        }
        .level-tag::before { content: ''; width: 6px; height: 6px; background: black; border-radius: 50%; margin-right: 8px; }

        .nav-back { cursor: pointer; color: var(--text-gray); margin-bottom: 20px; font-size: 12px; font-weight: 700; display: flex; align-items: center; }
        .nav-back i { margin-right: 6px; }

        h1 { font-size: 32px; font-weight: 900; line-height: 1.1; color: var(--accent-black); margin-bottom: 12px; }

        /* ÁREA DE DESLIZAR (O SEGREDO DO CÓDIGO) */
        .reveal-container {
            position: relative; flex-grow: 1; background: #f5f5f5; border-radius: 30px;
            margin-bottom: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center;
            border: 2px solid #eee;
        }

        .secret-content { position: absolute; text-align: center; z-index: 1; padding: 20px; }
        .word-secret { font-size: 32px; font-weight: 900; color: black; text-transform: uppercase; }

        /* A CAPA QUE DESLIZA */
        .sliding-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #e0e0e0; z-index: 2; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: grab;
            transition: transform 0.15s ease-out; touch-action: none;
            border-radius: 28px;
        }
        .sliding-cover i { margin-bottom: 10px; color: var(--text-gray); }
        .sliding-cover p { font-size: 12px; font-weight: 700; color: var(--text-gray); text-transform: uppercase; text-align: center; padding: 0 20px; }

        .btn-play {
            background: var(--accent-black); color: white; padding: 18px 20px;
            border-radius: 50px; border: none; display: flex; justify-content: space-between;
            align-items: center; font-size: 16px; font-weight: 700; cursor: pointer;
            width: 100%; transition: all 0.2s; margin-top: auto;
        }
        .btn-play:active { transform: scale(0.96); }
        .btn-play .arrow {
            background: white; color: black; width: 32px; height: 32px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
        }

        .input-box { background: #f5f5f5; padding: 16px; border-radius: 18px; margin-bottom: 8px; display: flex; align-items: center; border: 2px solid transparent; }
        .input-box input { background: transparent; border: none; font-weight: 700; width: 100%; outline: none; margin-left: 10px; }

        .chip-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .chip { background: #f0f0f0; padding: 15px; border-radius: 18px; text-align: center; font-weight: 700; cursor: pointer; }
        .chip.selected { background: black; color: white; }

        .footer-credits { text-align: center; font-size: 10px; color: #ccc; margin-top: 10px; }
    </style>
</head>
<body>

<div id="app">
    <div class="top-logo"><i data-lucide="zap" fill="black" size="35"></i></div>

    <div id="page1" class="page active">
        <div class="level-tag">Nível Um</div>
        <h1>Escolha o Modo</h1>
        <div style="margin-top:auto">
            <button class="btn-play" onclick="setMode('classic')">Clássico <div class="arrow"><i data-lucide="users" size="16"></i></div></button>
            <button class="btn-play btn-outline" onclick="setMode('spy')" style="background:transparent; color:black; border:2px solid #eee; margin-top:10px;">Espião <div class="arrow" style="background:black; color:white;"><i data-lucide="eye" size="16"></i></div></button>
        </div>
    </div>

    <div id="page2" class="page">
        <div class="nav-back" onclick="goTo('1')"><i data-lucide="arrow-left" size="14"></i> Voltar</div>
        <h1>Jogadores</h1>
        <div class="chip-grid" id="playerGrid"></div>
        <button class="btn-play" id="btnGoNames" style="display:none" onclick="renderNameInputs()">Próximo <div class="arrow"><i data-lucide="chevron-right" size="16"></i></div></button>
    </div>

    <div id="page3" class="page">
        <div class="nav-back" onclick="goTo('1')"><i data-lucide="arrow-left" size="14"></i> Voltar</div>
        <h1>Nomes</h1>
        <div id="nameList" style="overflow-y:auto; flex-grow:1;"></div>
        <button class="btn-play" onclick="goTo('Themes')">Temas <div class="arrow"><i data-lucide="layout" size="16"></i></div></button>
    </div>

    <div id="pageThemes" class="page">
        <div class="nav-back" onclick="goTo('1')"><i data-lucide="arrow-left" size="14"></i> Voltar</div>
        <h1>Temas</h1>
        <div id="themesContainer" style="overflow-y:auto; flex-grow:1;"></div>
        <button class="btn-play" onclick="startGame()">Começar <div class="arrow"><i data-lucide="play" size="16"></i></div></button>
    </div>

    <div id="pageReveal" class="page">
        <div class="level-tag">A vez de</div>
        <h1 id="revName">Jogador</h1>
        
        <div class="reveal-container">
            <div class="secret-content">
                <div id="revWord" class="word-secret">---</div>
            </div>
            <div class="sliding-cover" id="dragCover">
                <i data-lucide="chevrons-up" size="30"></i>
                <p>Arraste para cima para ver sua carta</p>
            </div>
        </div>

        <button class="btn-play" id="nextPlayerBtn" onclick="nextPlayer()" style="opacity: 0.2; pointer-events: none;">
            Próximo Jogador <div class="arrow"><i data-lucide="arrow-right" size="16"></i></div>
        </button>
    </div>

    <div id="pageVote" class="page">
        <div class="level-tag">Votação</div>
        <h1>Quem é o impostor?</h1>
        <div id="voteList" style="overflow-y:auto; flex-grow:1;"></div>
    </div>

    <div id="pageResult" class="page">
        <div class="nav-back" onclick="goTo('1')"><i data-lucide="arrow-left" size="14"></i> Menu</div>
        <h1 id="resTitle">Fim</h1>
        <div class="reveal-container" style="background:#121212; color:white; flex-direction:column; align-items:flex-start; padding:30px;">
            <p style="opacity:0.6; margin-bottom:5px;">O Impostor era:</p>
            <h2 id="resImpName" style="margin-bottom:15px;">---</h2>
            <p style="font-size:12px;">Palavra dele: <span id="resImpWord" style="color:var(--red-impostor); font-weight:900;"></span></p>
            <p style="font-size:12px;">Palavra Civis: <span id="resCivWord" style="color:#4ade80; font-weight:900;"></span></p>
        </div>
        <button class="btn-play" onclick="goTo('Themes')">Jogar de novo <div class="arrow"><i data-lucide="refresh-cw" size="16"></i></div></button>
    </div>

    <div class="footer-credits">v 2.3 · davi roberto</div>
</div>

<script>
    const THEMES = [
        { name: 'Comida', icon: 'utensils', pairs: [['Pizza', 'Esfiha'],['Hambúrguer', 'Sanduíche'],['Macarrão', 'Lasanha'],['Arroz', 'Cuscuz'],['Feijão', 'Lentilha'],['Sorvete', 'Pudim'],['Sushi', 'Temaki'],['Chocolate', 'Brigadeiro'],['Pastel', 'Coxinha'],['Cachorro-quente', 'Misto Quente']] },
        { name: 'Profissão', icon: 'briefcase', pairs: [['Médico', 'Enfermeiro'],['Professor', 'Tutor'],['Policial', 'Segurança'],['Bombeiro', 'Salva-vidas'],['Advogado', 'Juiz'],['Engenheiro', 'Arquiteto'],['Programador', 'Designer'],['Dentista', 'Ortodontista']] },
        { name: 'Animais', icon: 'dog', pairs: [['Cachorro', 'Lobo'], ['Gato', 'Pantera'], ['Leão', 'Tigre'], ['Zebra', 'Cavalo'], ['Jacaré', 'Crocodilo'], ['Baleia', 'Golfinho'], ['Cobra', 'Minhoca'], ['Urso', 'Panda'], ['Macaco', 'Chimpanzé'], ['Águia', 'Falcão']] },
        { name: 'Desenhos', icon: 'tv', pairs: [['Mickey', 'Minnie'], ['Toy Story', 'Carros'], ['Shrek', 'Madagascar'], ['Ben 10', 'Rex'], ['Bob Esponja', 'Patrick'], ['Scooby-Doo', 'Coragem'], ['Naruto', 'Sasuke'], ['Pokémon', 'Digimon']] },
        { name: 'Objetos', icon: 'package', pairs: [['Cadeira', 'Banco'], ['Sofá', 'Poltrona'], ['Mesa', 'Escrivaninha'], ['Geladeira', 'Freezer'], ['Fogão', 'Microondas'], ['Televisão', 'Monitor'], ['Mouse', 'Teclado'], ['Notebook', 'Tablet'], ['Celular', 'Iphone']] }
    ];

    let state = { mode: 'classic', players: 0, list: [], current: 0, theme: null, imp: {} };

    // ALGORITMO FISHER-YATES (SORTEIO JUSTO)
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function goTo(p) {
        document.querySelectorAll('.page').forEach(page => {
            if(page.classList.contains('active')) {
                page.style.animation = 'slideOutLeft 0.3s forwards';
                setTimeout(() => { page.classList.remove('active'); page.style.animation = ''; }, 300);
            }
        });
        setTimeout(() => { document.getElementById('page' + p).classList.add('active'); }, 305);
    }

    function setMode(m) { state.mode = m; goTo('2'); }

    // SETUP JOGADORES
    const pGrid = document.getElementById('playerGrid');
    for(let i=3; i<=9; i++) {
        const c = document.createElement('div'); c.className='chip'; c.innerText=i;
        c.onclick = () => {
            state.players = i;
            document.querySelectorAll('.chip').forEach(x=>x.classList.remove('selected'));
            c.classList.add('selected'); document.getElementById('btnGoNames').style.display='flex';
        };
        pGrid.appendChild(c);
    }

    function renderNameInputs() {
        const container = document.getElementById('nameList'); container.innerHTML = '';
        for(let i=1; i<=state.players; i++) {
            container.innerHTML += `<div class="input-box"><i data-lucide="user" size="16"></i><input type="text" value="Jogador ${i}" id="pIn${i}"></div>`;
        }
        lucide.createIcons(); goTo('3');
    }

    // SETUP TEMAS
    const tContainer = document.getElementById('themesContainer');
    THEMES.forEach((t) => {
        const d = document.createElement('div'); d.className='input-box'; d.style.cursor='pointer';
        d.innerHTML = `<i data-lucide="${t.icon}" size="18"></i><span style="margin-left:15px; font-weight:700">${t.name}</span>`;
        d.onclick = () => {
            state.theme = t;
            document.querySelectorAll('#themesContainer .input-box').forEach(x=>x.style.borderColor='transparent');
            d.style.borderColor = 'black';
        };
        tContainer.appendChild(d);
    });

    function startGame() {
        if(!state.theme) return alert("Selecione um tema!");
        state.list = [];
        const pair = state.theme.pairs[Math.floor(Math.random()*state.theme.pairs.length)];
        const impIdx = Math.floor(Math.random()*state.players);
        const flip = Math.random() > 0.5;
        const cW = pair[flip?0:1], iW = pair[flip?1:0];

        for(let i=0; i<state.players; i++) {
            const isImp = (i === impIdx);
            const name = document.getElementById('pIn'+(i+1)).value;
            state.list.push({ name, word: isImp ? iW : cW, isImp });
            if(isImp) state.imp = { name, word: iW, civ: cW };
        }
        shuffle(state.list);
        state.current = 0;
        prepReveal();
        goTo('Reveal');
    }

    // LOGICA DE DESLIZAR (TOQUE E ARRASTE)
    const dragCover = document.getElementById('dragCover');
    let startY = 0;
    let distY = 0;

    dragCover.addEventListener('touchstart', (e) => {
        startY = e.touches[0].clientY;
        dragCover.style.transition = "none";
    });

    dragCover.addEventListener('touchmove', (e) => {
        distY = e.touches[0].clientY - startY;
        if(distY < 0) { // Apenas para cima
            dragCover.style.transform = `translateY(${distY}px)`;
            // Se arrastar mais de 160px, já libera o botão de próximo
            if(Math.abs(distY) > 160) {
                document.getElementById('nextPlayerBtn').style.opacity = "1";
                document.getElementById('nextPlayerBtn').style.pointerEvents = "auto";
            }
        }
    });

    dragCover.addEventListener('touchend', () => {
        dragCover.style.transition = "transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1)";
        if(Math.abs(distY) < 150) {
            dragCover.style.transform = `translateY(0)`;
            document.getElementById('nextPlayerBtn').style.opacity = "0.2";
            document.getElementById('nextPlayerBtn').style.pointerEvents = "none";
        } else {
            dragCover.style.transform = `translateY(-110%)`;
        }
    });

    function prepReveal() {
        distY = 0;
        const p = state.list[state.current];
        document.getElementById('revName').innerText = p.name;
        
        const wordEl = document.getElementById('revWord');
        if(state.mode === 'spy' && p.isImp) {
            document.getElementById('revName').style.color = 'var(--red-impostor)';
            wordEl.innerHTML = `<span style="font-size:10px; color:red; font-weight:900">VOCÊ É O IMPOSTOR</span><br>${p.word}`;
        } else { 
            document.getElementById('revName').style.color = 'black';
            wordEl.innerText = p.word; 
        }

        dragCover.style.transform = `translateY(0)`;
        document.getElementById('nextPlayerBtn').style.opacity = "0.2";
        document.getElementById('nextPlayerBtn').style.pointerEvents = "none";
    }

    function nextPlayer() {
        state.current++;
        if(state.current < state.list.length) prepReveal();
        else showVote();
    }

    function showVote() {
        const vList = document.getElementById('voteList'); vList.innerHTML = '';
        state.list.forEach(p => {
            const d = document.createElement('div'); d.className='input-box';
            d.style.justifyContent = 'space-between'; d.style.cursor = "pointer";
            d.innerHTML = `<span>${p.name}</span> <i data-lucide="crosshair" size="16" style="color:#ddd"></i>`;
            d.onclick = () => finish(p.isImp);
            vList.appendChild(d);
        });
        lucide.createIcons(); goTo('Vote');
    }

    function finish(won) {
        document.getElementById('resImpName').innerText = state.imp.name;
        document.getElementById('resImpWord').innerText = state.imp.word;
        document.getElementById('resCivWord').innerText = state.imp.civ;
        document.getElementById('resTitle').innerText = won ? "Vitória dos Civis!" : "O Impostor Ganhou!";
        goTo('Result');
    }

    lucide.createIcons();
</script>
</body>
</html>
